baseURL = "https://www.antipestsolutions.com.au/"
title = "Anti-Pest Solutions"
theme = "hugo-universal-theme"
languageCode = "en-au"
# Site language. Available translations in the theme's `/i18n` directory.
defaultContentLanguage = "en"
# Interpret bare dates (e.g. `date = 2026-07-22` with no time/offset) in this
# timezone instead of UTC, so same-day posts aren't hidden as "future" content.
timeZone = "Australia/Sydney"

# number of words of summarized post content (default 70)
summaryLength = 70

# not pluralize title pages by default
pluralizelisttitles = false

# Dev-server only (ignored by `hugo` production builds): stop the browser from
# caching assets so `hugo server` refreshes always show the latest files.
[server]
[[server.headers]]
for = "/**"
[server.headers.values]
Cache-Control = "no-cache, no-store, must-revalidate"

[services]
    # Enable comments by entering your Disqus shortname
    [services.disqus]
        shortname = ""
    # Enable Google Analytics by entering your tracking code
    [services.googleAnalytics]
        id = "G-BN8JG4JR7E"

# Define the number of posts per page
[pagination]
    pagerSize = 10

# Main menu
[menu]
[[menu.main]]
    name       = "Home"
    identifier = "menu.home"
    url        = "/"
    weight     = 1

[[menu.main]]
    name       = "About Us"
    identifier = "menu.about"
    url        = "/about-us/"
    weight     = 2

[[menu.main]]
    name       = "Residential"
    identifier = "menu.residential"
    url        = "/residential/"
    weight     = 3

[[menu.main]]
    name       = "Commercial"
    identifier = "menu.commercial"
    url        = "/commercial/"
    weight     = 4

[[menu.main]]
    name       = "Blog"
    identifier = "menu.blog"
    url        = "/blog/"
    weight     = 5

[[menu.main]]
    identifier = "contact"
    name       = "Contact Us"
    url        = "/contact/"
    weight     = 6

# Top bar contact links menu

[[menu.topbar]]
    weight = 1
    name = "Phone"
    url = "tel:+61425209149"
    pre = "<i class='fas fa-2x fa-phone'></i>"

[[menu.topbar]]
    weight = 2
    name = "Email"
    url = "mailto:mail@antipestsolutions.com.au"
    pre = "<i class='fas fa-2x fa-envelope'></i>"

[[menu.topbar]]
    weight = 3
    name = "Facebook"
    url = "https://www.facebook.com/AntiPestSolutions1/"
    pre = "<i class='fab fa-2x fa-facebook'></i>"

[params]
    viewMorePostLink = "/blog/"
    author = "Anti-Pest Solutions"
    defaultKeywords = ["pest control", "Hawkesbury", "residential pest control", "commercial pest control", "NSW"]
    mainSections = ["blog"]
    defaultDescription = "Anti-Pest Solutions provides licensed, fully insured residential and commercial pest control across the Hawkesbury region, NSW."

    # Social media
    facebook_site = "AntiPestSolutions1"
    twitter_site = ""
    default_sharing_image = "img/sharing-default.png"

    # Google Maps widget: disabled until a real API key + confirmed coordinates are supplied.
    # See README for setup - the key below is the theme's shared demo key and will not
    # reliably work on a production domain.
    enableGoogleMaps = false
    googleMapsApiKey = ""

    latitude = "-33.5810"
    longitude = "150.6820"

    # Style options: default (light-blue), blue, green, marsala, pink, red, turquoise, violet
    style = "blue"

    # Since this template is static, the contact form uses www.formspree.io as a
    # proxy. The form makes a POST request to their servers to send the actual
    # email. Visitors can send up to a 50 emails each month for free.
    formspree_action = "https://formspree.io/f/mvzezyyv"
    contact_form_ajax = true

    enableRecaptchaInContactForm = false
    googleRecaptchaKey = "site_key_for_google_recaptcha"

    about_us = "<p>Anti-Pest Solutions is an independent, owner-managed pest control business serving the Hawkesbury region and surrounding communities. We're fully licensed, fully insured, and use only APVMA-approved, environmentally responsible products.</p>"
    copyright = "Copyright (c) 2015 - 2026, Anti-Pest Solutions; all rights reserved."

    # Format dates with Go's time formatting
    date_format = "January 2, 2006"

    dropdown_mouse_over = false

    disabled_logo = false
    logo_text = "Anti-Pest Solutions"

    logo = "img/logo.jpg"
    logo_small = "img/logo-small.jpg"
    contact_url = "/contact"
    address = """<p class="text-uppercase"><strong>Anti-Pest Solutions</strong>
        <br>1 Currawong Crescent
        <br>Bowen Mountain, NSW 2753
        <br>
        <strong>Australia</strong>
      </p>
      <p>Phone: <a href="tel:+61425209149">0425 209 149</a>
        <br>Email: <a href="mailto:mail@antipestsolutions.com.au">mail@antipestsolutions.com.au</a>
      </p>
      """

[permalinks]
    blog = "/blog/:year/:month/:day/:contentbasename/"

# Enable or disable top bar with social icons
[params.topbar]
    enable = true
    text = """<p class="hidden-sm hidden-xs">Contact us on 0425 209 149 or mail@antipestsolutions.com.au.</p>
      <p class="hidden-md hidden-lg"><a href="tel:+61425209149" data-animate-hover="pulse"><i class="fas fa-phone"></i></a>
      <a href="mailto:mail@antipestsolutions.com.au" data-animate-hover="pulse"><i class="fas fa-envelope"></i></a>
      </p>
      """

# Enable and disable widgets for the right sidebar
[params.widgets]
    categories = true
    tags = true
    search = true

[params.carouselCustomers]
    items = 6
    auto_play = false
    slide_speed = 2000
    pagination_speed = 1000

[params.carouselTestimonials]
    items = 4
    auto_play = false
    slide_speed = 2000
    pagination_speed = 1000

[params.carouselHomepage]
    # All carousel items are defined in their own files, see 'data/carousel'.
    enable = true
    auto_play = true
    slide_speed = 2000
    pagination_speed = 1000

[params.features]
    enable = true
    cols = 3 # Default: 3, Available values 2,3,4,6
    # All features are defined in their own files, see 'data/features'.

[params.testimonials]
    enable = false
    # No real client testimonials collected yet - re-enable once some are gathered
    # and dropped into data/testimonials.
    title = "Testimonials"
    subtitle = "We have worked with many clients and we always like to hear they come out from the cooperation happy and satisfied. Have a look what our clients said about us."

[params.see_more]
    enable = false

[params.clients]
    enable = false
    # No client logos collected yet - re-enable once some are gathered
    # and dropped into data/clients.
    title = "Our Clients"
    subtitle = ""

[params.recent_posts]
    enable = true
    title = "From our blog"
    subtitle = "Pest control tips and news for Hawkesbury and surrounding homes and businesses. Check back soon."
    hide_summary = false

[params.footer.recent_posts]
    enable = true

[taxonomies]
    category = "categories"
    tag = "tags"
    author = "authors"
